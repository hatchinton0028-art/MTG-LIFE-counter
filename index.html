<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MTG Commander Life Counter</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#08080e;overflow:hidden;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect, useMemo } = React;

// ─── Google Fonts (link tag, not @import inside style) ────────
function injectFonts() {
if (document.getElementById(“mtg-fonts”)) return;
const l = document.createElement(“link”);
l.id = “mtg-fonts”;
l.rel = “stylesheet”;
l.href = “https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@0;1&family=Noto+Sans+JP:wght@400;700&display=swap”;
document.head.appendChild(l);
}

// ─── CSS keyframes ────────────────────────────────────────────
const KEYFRAMES = `@keyframes heartbeat{ 0%,100%{box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 0 0 0 rgba(220,30,30,0)} 50%{box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 0 18px 4px rgba(220,30,30,.55)} } @keyframes critPulse{ 0%,100%{text-shadow:0 0 12px rgba(255,60,60,.4)} 50%{text-shadow:0 0 30px rgba(255,60,60,1),0 0 60px rgba(255,60,60,.5)} } @keyframes titleGlow{ 0%,100%{text-shadow:0 0 28px rgba(201,162,39,.5)} 50%{text-shadow:0 0 50px rgba(201,162,39,.9),0 0 80px rgba(201,162,39,.3)} } @keyframes deltaUp{ 0%{opacity:1;transform:translateY(0) scale(1)} 80%{opacity:.8;transform:translateY(-28px) scale(1.1)} 100%{opacity:0;transform:translateY(-44px) scale(.8)} } @keyframes deadOverlay{0%{opacity:0}100%{opacity:1}} @keyframes defeatStamp{ 0%{opacity:0;transform:translate(-50%,-50%) rotate(-12deg) scale(2.5)} 60%{opacity:1;transform:translate(-50%,-50%) rotate(-12deg) scale(.95)} 80%{transform:translate(-50%,-50%) rotate(-12deg) scale(1.05)} 100%{transform:translate(-50%,-50%) rotate(-12deg) scale(1)} } @keyframes victoryBg{ 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} } @keyframes victoryTitle{ 0%{opacity:0;transform:scale(.5) translateY(30px)} 60%{transform:scale(1.08) translateY(-4px)} 100%{opacity:1;transform:scale(1) translateY(0)} } @keyframes victoryName{ 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} } @keyframes particleFly{ 0%{opacity:1;transform:translate(0,0) scale(1)} 100%{opacity:0;transform:translate(var(--pdx),var(--pdy)) scale(0)} } @keyframes goldRain{ 0%{transform:translateY(-20px) rotate(var(--gr));opacity:1} 100%{transform:translateY(110vh) rotate(calc(var(--gr) + 360deg));opacity:.3} } @keyframes slideIn{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} } @keyframes shimmerMove{ 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} } @keyframes lethalBlink{ 0%,100%{opacity:1} 50%{opacity:.2} } @keyframes cardEnter{ from{opacity:0;transform:scale(.93) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} } @keyframes spinCrown{ 0%{transform:rotate(-20deg) scale(.4);opacity:0} 60%{transform:rotate(8deg) scale(1.15)} 100%{transform:rotate(0deg) scale(1);opacity:1} } @keyframes flashDmg{ 0%{opacity:.6} 100%{opacity:0} }`;

function injectCSS() {
if (document.getElementById(“mtg-kf”)) return;
const s = document.createElement(“style”);
s.id = “mtg-kf”;
s.textContent = KEYFRAMES;
document.head.appendChild(s);
}

// ─── Constants ────────────────────────────────────────────────
const COLORS = [
{ bg: “#0d1a0f”, accent: “#2eaa50”, dot: “#33cc55” },
{ bg: “#0d1220”, accent: “#3366cc”, dot: “#4488ff” },
{ bg: “#1e0d0d”, accent: “#cc3322”, dot: “#ff5544” },
{ bg: “#190d22”, accent: “#9933cc”, dot: “#bb55ff” },
{ bg: “#1c1808”, accent: “#cc9922”, dot: “#ffcc33” },
{ bg: “#121620”, accent: “#8899bb”, dot: “#aabbdd” },
];

const CTR_DEFS = [
{ key: “poison”, icon: “☠”,  label: “毒”,    sub: “10個→敗北”, color: “#cc66ff” },
{ key: “rad”,    icon: “☢”,  label: “放射線”, sub: “”,          color: “#88dd44” },
{ key: “ctr3”,   icon: “◈”,  label: “未定1”,  sub: “”,          color: “#ff9955” },
{ key: “ctr4”,   icon: “◇”,  label: “未定2”,  sub: “”,          color: “#55ccff” },
];

const GOLD    = “#c9a227”;
const GOLDDIM = “#7a6018”;
const NT      = { WebkitTapHighlightColor: “transparent” };

// ─── Data helpers ─────────────────────────────────────────────
function makePlayer(id, life) {
return {
id,
name: `プレイヤー${id + 1}`,
life,
poison: 0, rad: 0, ctr3: 0, ctr4: 0,
cmdDmg: {},
dead: false,
showCtrs: false,
colorIdx: id % COLORS.length,
};
}
function makePlayers(n, life) {
const ps = Array.from({ length: n }, (_, i) => makePlayer(i, life));
ps.forEach(p => ps.forEach(o => { if (o.id !== p.id) p.cmdDmg[o.id] = 0; }));
return ps;
}
function ts() { return new Date().toTimeString().slice(0, 8); }
function clone(ps) { return ps.map(p => ({ …p, cmdDmg: { …p.cmdDmg } })); }

// ─── Layout ───────────────────────────────────────────────────
// 2p: [P0↑] / [P1]            1×2
// 3p: [P0↑][P1↑] / [P2 span] 2×2
// 4p: [P0↑][P1↑] / [P2][P3]  2×2
// 5p: [P0↑][P1↑][P4side]      3×2  P4 spans col3 rows 1-2
//     [P2 ][P3 ][P4side]
// 6p: [P0↑][P1↑][P2↑]         3×2
//     [P3 ][P4 ][P5 ]
function buildLayout(n) {
if (n === 2) return {
css: { gridTemplateColumns: “1fr”, gridTemplateRows: “1fr 1fr” },
cells: [{ pid: 0, flip: true }, { pid: 1, flip: false }],
};
if (n === 3) return {
css: { gridTemplateColumns: “1fr 1fr”, gridTemplateRows: “1fr 1fr” },
cells: [
{ pid: 0, flip: true },
{ pid: 1, flip: true },
{ pid: 2, flip: false, gc: “1 / -1” },
],
};
if (n === 4) return {
css: { gridTemplateColumns: “1fr 1fr”, gridTemplateRows: “1fr 1fr” },
cells: [
{ pid: 0, flip: true  },
{ pid: 1, flip: true  },
{ pid: 2, flip: false },
{ pid: 3, flip: false },
],
};
if (n === 5) return {
css: { gridTemplateColumns: “1fr 1fr 1fr”, gridTemplateRows: “1fr 1fr” },
cells: [
{ pid: 0, flip: true,  gc: “1”, gr: “1” },
{ pid: 1, flip: true,  gc: “2”, gr: “1” },
{ pid: 4, flip: false, gc: “3”, gr: “1 / 3”, side: true },
{ pid: 2, flip: false, gc: “1”, gr: “2” },
{ pid: 3, flip: false, gc: “2”, gr: “2” },
],
};
// 6
return {
css: { gridTemplateColumns: “1fr 1fr 1fr”, gridTemplateRows: “1fr 1fr” },
cells: [
{ pid: 0, flip: true  },
{ pid: 1, flip: true  },
{ pid: 2, flip: true  },
{ pid: 3, flip: false },
{ pid: 4, flip: false },
{ pid: 5, flip: false },
],
};
}

// ─── Tiny effect components ───────────────────────────────────
function Particles({ color, pos }) {
const items = useMemo(() => Array.from({ length: 10 }, (_, i) => {
const a = (i / 10) * 360 + Math.random() * 36;
const d = 28 + Math.random() * 44;
return {
id: i,
x: Math.cos(a * Math.PI / 180) * d,
y: Math.sin(a * Math.PI / 180) * d,
s: 4 + Math.random() * 5,
dl: Math.random() * 0.1,
};
}), []);

return (
<div style={{ position: “absolute”, inset: 0, pointerEvents: “none”, zIndex: 20, overflow: “visible” }}>
{items.map(it => (
<div key={it.id} style={{
position: “absolute”, top: “50%”, left: “50%”,
width: it.s, height: it.s, borderRadius: “50%”,
background: pos ? color : “#ff4444”,
“–pdx”: it.x + “px”,
“–pdy”: it.y + “px”,
animation: `particleFly .55s ${it.dl}s ease-out forwards`,
}} />
))}
</div>
);
}

function DeltaNum({ delta }) {
return (
<div style={{
position: “absolute”, top: “28%”, left: “50%”,
transform: “translateX(-50%)”,
fontFamily: “‘Cinzel’, serif”, fontWeight: 900,
fontSize: “clamp(16px,5vw,30px)”,
color: delta > 0 ? “#55ff88” : “#ff5555”,
textShadow: delta > 0 ? “0 0 10px rgba(85,255,136,.8)” : “0 0 10px rgba(255,85,85,.8)”,
animation: “deltaUp .85s ease-out forwards”,
pointerEvents: “none”, zIndex: 25, whiteSpace: “nowrap”,
}}>
{delta > 0 ? “+” : “”}{delta}
</div>
);
}

function GoldRain() {
const drops = useMemo(() => Array.from({ length: 36 }, (_, i) => ({
id: i,
left: Math.random() * 100,
size: 8 + Math.random() * 14,
dur: 2 + Math.random() * 3,
delay: Math.random() * 2,
rot: (Math.random() * 360) + “deg”,
ch: [“✦”, “⚜”, “◆”, “★”, “♦”][i % 5],
})), []);
return (
<div style={{ position: “absolute”, inset: 0, pointerEvents: “none”, overflow: “hidden”, zIndex: 1 }}>
{drops.map(d => (
<div key={d.id} style={{
position: “absolute”, left: d.left + “%”, top: “-30px”,
fontSize: d.size, color: GOLD, “–gr”: d.rot,
animation: `goldRain ${d.dur}s ${d.delay}s linear infinite`,
opacity: .85,
}}>{d.ch}</div>
))}
</div>
);
}

function DmgFlash({ trigger }) {
const [on, setOn] = useState(false);
const prev = useRef(trigger);
useEffect(() => {
if (trigger === prev.current) return;
prev.current = trigger;
setOn(true);
const t = setTimeout(() => setOn(false), 280);
return () => clearTimeout(t);
}, [trigger]);
if (!on) return null;
return (
<div style={{
position: “absolute”, inset: 0,
background: “rgba(255,50,50,.22)”,
animation: “flashDmg .28s ease-out forwards”,
pointerEvents: “none”, zIndex: 18,
}} />
);
}

// ─── Shared UI ────────────────────────────────────────────────
function TopBtn({ onClick, children, active }) {
return (
<button onClick={onClick} style={{
background: active ? “rgba(201,162,39,.18)” : “none”,
border: `1px solid ${active ? GOLD : "rgba(139,105,20,.4)"}`,
color: active ? GOLD : “#8a7050”,
fontFamily: “‘Cinzel’, serif”,
fontSize: 9, letterSpacing: 1, padding: “4px 9px”, cursor: “pointer”, …NT,
}}>{children}</button>
);
}

function ModalBtn({ onClick, danger, children }) {
return (
<button onClick={onClick} style={{
padding: “8px 20px”,
border: `1px solid ${danger ? "#cc2222" : GOLDDIM}`,
background: “none”, color: danger ? “#ff5555” : GOLD,
fontFamily: “‘Cinzel’, serif”, fontSize: 11, letterSpacing: 1.5,
cursor: “pointer”, …NT,
}}>{children}</button>
);
}

function Sheet({ children }) {
return (
<div style={{
position: “fixed”, inset: 0, background: “rgba(0,0,0,.9)”,
zIndex: 100, display: “flex”, alignItems: “center”, justifyContent: “center”, padding: 20,
}}>
<div style={{
background: “#14141e”, border: `1px solid ${GOLDDIM}`, padding: 24,
maxWidth: 340, width: “100%”,
clipPath: “polygon(12px 0%,calc(100% - 12px) 0%,100% 12px,100% calc(100% - 12px),calc(100% - 12px) 100%,12px 100%,0% calc(100% - 12px),0% 12px)”,
}}>{children}</div>
</div>
);
}

function SheetTitle({ children }) {
return (
<h2 style={{
fontFamily: “‘Cinzel Decorative’, serif”, color: GOLD,
fontSize: 15, textAlign: “center”, marginBottom: 18,
}}>{children}</h2>
);
}

function PickBtn({ active, onClick, children }) {
return (
<button onClick={onClick} style={{
minWidth: 52, height: 50, padding: “0 12px”,
background: active ? “rgba(139,105,20,.28)” : “#101018”,
border: `1px solid ${active ? GOLD : "#3a2e10"}`,
color: active ? “#e8c840” : “#a08030”,
fontFamily: “‘Cinzel’, serif”, fontSize: 20, cursor: “pointer”,
boxShadow: active ? “0 0 14px rgba(201,162,39,.25)” : “none”,
transition: “all .15s”,
clipPath: “polygon(7px 0%,calc(100% - 7px) 0%,100% 7px,100% calc(100% - 7px),calc(100% - 7px) 100%,7px 100%,0% calc(100% - 7px),0% 7px)”,
…NT,
}}>{children}</button>
);
}

function Toggle({ on, onClick }) {
return (
<button onClick={onClick} style={{
display: “flex”, alignItems: “center”, gap: 10,
background: on ? “rgba(201,162,39,.15)” : “rgba(0,0,0,.4)”,
border: `2px solid ${on ? GOLD : "#3a2e10"}`,
color: on ? GOLD : “#6a5a40”,
fontFamily: “‘Noto Sans JP’, sans-serif”, fontSize: 13,
padding: “9px 22px”, cursor: “pointer”,
borderRadius: 4, transition: “all .2s”, …NT,
}}>
{/* pill */}
<div style={{
width: 30, height: 17, borderRadius: 9,
background: on ? “rgba(201,162,39,.45)” : “rgba(80,60,20,.3)”,
border: `1px solid ${on ? GOLD : "#3a2e10"}`,
position: “relative”, transition: “all .2s”,
}}>
<div style={{
position: “absolute”, top: 3,
left: on ? 12 : 3,
width: 10, height: 10, borderRadius: “50%”,
background: on ? GOLD : “#6a5a40”,
transition: “left .15s”,
}} />
</div>
{on ? “演出 ON ✨” : “演出 OFF”}
</button>
);
}

function Sm({ onClick, danger, children, sz = 22 }) {
return (
<button onClick={onClick} style={{
width: sz, height: sz, background: “none”, padding: 0, lineHeight: 1,
border: `1px solid ${danger ? "rgba(200,34,34,.4)" : "rgba(139,105,20,.35)"}`,
color: danger ? “#ff7777” : “#8a7050”,
fontSize: sz - 6, cursor: “pointer”,
display: “flex”, alignItems: “center”, justifyContent: “center”,
borderRadius: 2, fontFamily: “inherit”, …NT,
}}>{children}</button>
);
}

// ─── LifeBtn (with hold-repeat) ───────────────────────────────
function LifeBtn({ onTick, minus, accent, sz = 46 }) {
const hold = useRef(null);
const cnt  = useRef(0);
const [dn, setDn] = useState(false);

const start = useCallback(e => {
e.preventDefault();
setDn(true); onTick(1); cnt.current = 0;
hold.current = setInterval(() => {
cnt.current++;
onTick(cnt.current > 18 ? 5 : 1);
}, 140);
}, [onTick]);

const end = useCallback(() => {
setDn(false);
if (hold.current) { clearInterval(hold.current); hold.current = null; }
}, []);

useEffect(() => () => { if (hold.current) clearInterval(hold.current); }, []);

return (
<button
onPointerDown={start} onPointerUp={end}
onPointerLeave={end} onPointerCancel={end}
style={{
width: sz, height: sz, flexShrink: 0, cursor: “pointer”,
background: dn ? (minus ? “rgba(204,34,34,.28)” : `${accent}33`) : “rgba(0,0,0,.55)”,
border: `1px solid ${minus ? "rgba(200,34,34,.7)" : `${accent}bb`}`,
color: minus ? “#ee6666” : accent,
fontSize: Math.round(sz * .56),
display: “flex”, alignItems: “center”, justifyContent: “center”,
transform: dn ? “scale(.84)” : “scale(1)”,
transition: “transform .08s, background .08s, box-shadow .08s”,
boxShadow: dn ? (minus ? “0 0 12px rgba(204,34,34,.5)” : `0 0 12px ${accent}88`) : “none”,
clipPath: “polygon(5px 0%,calc(100% - 5px) 0%,100% 5px,100% calc(100% - 5px),calc(100% - 5px) 100%,5px 100%,0% calc(100% - 5px),0% 5px)”,
userSelect: “none”, WebkitUserSelect: “none”, fontFamily: “inherit”, …NT,
}}
>{minus ? “−” : “+”}</button>
);
}

// ─── PlayerCard ───────────────────────────────────────────────
function PlayerCard({
player, allPlayers, flip, fx,
onLife, onCtr, onCmd, onName, onEdit, onCtrToggle, onRevive,
}) {
const col    = COLORS[player.colorIdx];
const others = allPlayers.filter(o => o.id !== player.id);

// fx state
const [dNum,   setDNum]   = useState(null);
const [dKey,   setDKey]   = useState(0);
const [burst,  setBurst]  = useState(null);
const [fKey,   setFKey]   = useState(0);
const prevL = useRef(player.life);

useEffect(() => {
if (player.dead) return;
const diff = player.life - prevL.current;
if (diff !== 0) {
prevL.current = player.life;
if (fx) {
setDNum(diff); setDKey(k => k + 1);
setBurst({ k: Date.now(), pos: diff > 0 });
if (diff < 0) setFKey(k => k + 1);
}
}
}, [player.life, player.dead, fx]);

const lc = player.dead    ? “#4a3a28”
: player.life <= 5  ? “#ff5555”
: player.life <= 10 ? “#ffaa44”
: “#e8dcc8”;

const crit = !player.dead && player.life <= 5;
const low  = !player.dead && player.life <= 10 && player.life > 5;

return (
<div style={{
width: “100%”, height: “100%”,
background: col.bg,
border: `1px solid ${player.dead ? "rgba(80,40,40,.4)" : col.accent + "66"}`,
display: “flex”, flexDirection: “column”,
position: “relative”, overflow: “hidden”,
transform: “none”,
animation: fx && !player.dead
? (crit ? “heartbeat 1.1s ease-in-out infinite” : “cardEnter .3s ease-out both”)
: “none”,
boxShadow: player.dead ? “none” : `inset 0 0 40px rgba(0,0,0,.5)`,
}}>

```
  {/* shimmer top-line */}
  <div style={{
    position: "absolute", top: 0, left: 0, right: 0, height: 2,
    background: `linear-gradient(to right,transparent,${col.accent},transparent)`,
    pointerEvents: "none", overflow: "hidden",
  }}>
    {fx && !player.dead && (
      <div style={{
        position: "absolute", top: 0, bottom: 0, width: "60%",
        background: "linear-gradient(to right,transparent,rgba(255,255,255,.5),transparent)",
        animation: "shimmerMove 2.5s linear infinite",
      }} />
    )}
  </div>

  {/* effects */}
  {fx && <DmgFlash trigger={fKey} />}
  {fx && burst && <Particles key={burst.k} color={col.accent} pos={burst.pos} />}
  {fx && dNum !== null && <DeltaNum key={dKey} delta={dNum} />}

  {/* dead overlay */}
  {player.dead && (
    <div style={{
      position: "absolute", inset: 0, background: "rgba(0,0,0,.65)",
      animation: fx ? "deadOverlay .4s ease-out both" : "none",
      zIndex: 8, pointerEvents: "none",
    }} />
  )}

  {/* DEFEATED stamp */}
  {player.dead && (
    <div style={{
      position: "absolute", top: "50%", left: "50%",
      transform: "translate(-50%,-50%) rotate(-12deg)",
      fontFamily: "'Cinzel Decorative', serif",
      fontSize: "clamp(10px,3vw,18px)", color: "#ff5555",
      border: "2px solid #cc2222", padding: "3px 8px",
      letterSpacing: 3, textShadow: "0 0 12px rgba(255,80,80,.9)",
      pointerEvents: "none", whiteSpace: "nowrap", zIndex: 9,
      animation: fx ? "defeatStamp .5s cubic-bezier(.2,1.6,.4,1) both" : "none",
    }}>敗北</div>
  )}

  {/* header */}
  <div style={{
    display: "flex", alignItems: "center", justifyContent: "space-between",
    padding: "3px 7px", background: "rgba(0,0,0,.5)",
    borderBottom: `1px solid ${col.accent}22`, flexShrink: 0,
  }}>
    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
      <div style={{
        width: 8, height: 8, borderRadius: "50%", background: col.dot,
        boxShadow: `0 0 6px ${col.dot}`, flexShrink: 0,
      }} />
      <input
        value={player.name} maxLength={10}
        onChange={e => onName(player.id, e.target.value)}
        style={{
          background: "none", border: "none",
          borderBottom: `1px solid ${col.accent}40`,
          color: "#e8dcc8", fontFamily: "'Noto Sans JP', sans-serif",
          fontSize: 11, width: 82, padding: "1px 3px", outline: "none", ...NT,
        }}
      />
    </div>
    <div style={{ display: "flex", gap: 3, alignItems: "center" }}>
      <button onClick={() => onCtrToggle(player.id)} style={{
        background: player.showCtrs ? `${col.accent}33` : "none",
        border: `1px solid ${player.showCtrs ? col.accent : col.accent + "44"}`,
        color: player.showCtrs ? col.accent : col.accent + "88",
        fontSize: 9, padding: "2px 6px", cursor: "pointer",
        fontFamily: "'Noto Sans JP', sans-serif", transition: "all .15s", ...NT,
      }}>カウンター</button>
      {player.dead && (
        <button onClick={() => onRevive(player.id)} style={{
          background: "rgba(40,130,40,.2)", border: "1px solid rgba(50,200,50,.5)",
          color: "#55ff88", fontSize: 9, padding: "2px 6px",
          cursor: "pointer", fontFamily: "'Noto Sans JP', sans-serif", ...NT,
        }}>復活</button>
      )}
    </div>
  </div>

  {/* life row */}
  <div style={{
    display: "flex", alignItems: "center", justifyContent: "center",
    gap: "clamp(4px,1.5vw,12px)",
    flex: 1, padding: "3px 5px", minHeight: 0,
    pointerEvents: player.dead ? "none" : "auto",
    opacity: player.dead ? .25 : 1, transition: "opacity .4s",
  }}>
    <LifeBtn minus accent={col.accent} sz={46} onTick={n => onLife(player.id, -n)} />
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 1, position: "relative" }}>
      <div
        onClick={() => !player.dead && onEdit(player.id)}
        style={{
          fontFamily: "'Cinzel', serif",
          fontSize: "clamp(24px,7vw,56px)",
          fontWeight: 900, color: lc, lineHeight: 1,
          cursor: player.dead ? "default" : "pointer",
          userSelect: "none", transition: "color .3s",
          animation: fx && crit ? "critPulse 1.1s ease-in-out infinite" : "none",
        }}
      >{player.life}</div>
      {!player.dead && (
        <div style={{ fontSize: 7, color: `${col.accent}55`, fontFamily: "'Noto Sans JP', sans-serif" }}>

// ─── SidewaysCard (rotates PlayerCard 90°) ────────────────────
function SidewaysCard(props) {
const ref  = useRef(null);
const [sz, setSz] = useState({ w: 0, h: 0 });

useEffect(() => {
if (!ref.current) return;
const ro = new ResizeObserver(([e]) => {
setSz({ w: e.contentRect.width, h: e.contentRect.height });
});
ro.observe(ref.current);
return () => ro.disconnect();
}, []);

const { w, h } = sz;
return (
<div ref={ref} style={{ position: “absolute”, inset: 0, overflow: “hidden” }}>
{w > 0 && h > 0 && (
<div style={{
position: “absolute”,
top: (h - w) / 2, left: (w - h) / 2,
width: h, height: w,
transform: “rotate(-90deg)”, transformOrigin: “center center”,
}}>
<PlayerCard {…props} flip={false} />
</div>
)}
</div>
);
}

function App() {
useEffect(() => { injectFonts(); injectCSS(); }, []);

const [screen,    setScreen]    = useState(“setup”);
const [players,   setPlayers]   = useState([]);
const [undo,      setUndo]      = useState([]);
const [log,       setLog]       = useState([]);
const [showLog,   setShowLog]   = useState(false);
const [showReset, setShowReset] = useState(false);
const [editPid,   setEditPid]   = useState(null);
const [editVal,   setEditVal]   = useState(””);
const [winner,    setWinner]    = useState(null);
const [fx,        setFx]        = useState(true);
const nRef = useRef(4);

const addLog  = useCallback(m => setLog(p => [{ t: ts(), m }, …p].slice(0, 150)), []);
const pushUndo = useCallback(ps => setUndo(p => […p, clone(ps)].slice(-30)), []);

function doUndo() {
setUndo(prev => {
if (!prev.length) return prev;
setPlayers(prev[prev.length - 1]);
setWinner(null);
addLog(“↩ 元に戻す”);
return prev.slice(0, -1);
});
}

function start(n, life, fxOn) {
nRef.current = n;
setFx(fxOn);
setPlayers(makePlayers(n, life));
setUndo([]);
setLog([{ t: ts(), m: `🎮 ゲーム開始 — ${n}人 / ${life}ライフ` }]);
setWinner(null);
setScreen(“game”);
}

function chLife(pid, d) {
setPlayers(prev => {
pushUndo(prev);
const next = prev.map(p => p.id !== pid ? p : { …p, life: Math.max(-999, p.life + d) });
const p = next.find(x => x.id === pid);
addLog(`${p.name}：ライフ ${d > 0 ? "+" : ""}${d} → ${p.life}`);
if (p.life <= 0 && !p.dead) setTimeout(() => elim(pid, “ライフが0以下”), 300);
return next;
});
}

function chCtr(pid, key, d) {
setPlayers(prev => {
pushUndo(prev);
const next = prev.map(p => p.id !== pid ? p : { …p, [key]: Math.max(0, p[key] + d) });
const p = next.find(x => x.id === pid);
const def = CTR_DEFS.find(c => c.key === key);
addLog(`${p.name}：${def?.label || key} ${d > 0 ? "+" : ""}${d} → ${p[key]}`);
if (key === “poison” && p.poison >= 10 && !p.dead)
setTimeout(() => elim(pid, “毒カウンター10個（ルール104.3d）”), 300);
if (key === “rad” && d > 0 && p.rad >= 10) {
const loss = Math.floor(p.rad / 10);
addLog(`☢ 放射線：ライフ-${loss}`);
setTimeout(() => chLife(pid, -loss), 0);
}
return next;
});
}

function chCmd(pid, src, d) {
setPlayers(prev => {
pushUndo(prev);
const next = prev.map(p => p.id !== pid ? p : {
…p, cmdDmg: { …p.cmdDmg, [src]: Math.max(0, (p.cmdDmg[src] || 0) + d) },
});
const p = next.find(x => x.id === pid);
const sn = prev.find(x => x.id === src)?.name;
addLog(`${p.name}：CMD from ${sn} → ${p.cmdDmg[src]}`);
if (p.cmdDmg[src] >= 21 && !p.dead)
setTimeout(() => elim(pid, `統率者ダメージ21以上（${sn}から）`), 300);
return next;
});
}

function elim(pid, reason) {
setPlayers(prev => {
const t = prev.find(p => p.id === pid);
if (!t || t.dead) return prev;
const next = prev.map(p => p.id === pid ? { …p, dead: true } : p);
addLog(`💀 ${t.name} 敗北 — ${reason}`);
const alive = next.filter(p => !p.dead);
if (alive.length === 1)
setTimeout(() => { setWinner(alive[0]); addLog(`👑 ${alive[0].name} 勝利！`); }, 700);
return next;
});
}

function revive(pid) {
setPlayers(prev => {
const next = prev.map(p => p.id === pid ? { …p, dead: false } : p);
addLog(`↩ ${prev.find(x => x.id === pid)?.name} 復活`);
setWinner(null);
return next;
});
}

function openEdit(pid) {
setEditPid(pid);
setEditVal(String(players.find(p => p.id === pid)?.life ?? 40));
}
function confirmEdit() {
const v = parseInt(editVal, 10);
if (!isNaN(v)) {
setPlayers(prev => {
pushUndo(prev);
return prev.map(p => {
if (p.id !== editPid) return p;
addLog(`${p.name}：ライフを ${v} に設定`);
return { …p, life: v };
});
});
}
setEditPid(null);
}

if (screen === “setup”) return <Setup onStart={start} />;

const { css: gs, cells } = buildLayout(nRef.current);

// shared props passed to every card
const cp = {
allPlayers: players, fx,
onLife: chLife, onCtr: chCtr, onCmd: chCmd,
onName: (pid, n) => setPlayers(prev => prev.map(p => p.id === pid ? { …p, name: n || `プレイヤー${pid + 1}` } : p)),
onEdit: openEdit,
onCtrToggle: pid => setPlayers(prev => prev.map(p => p.id === pid ? { …p, showCtrs: !p.showCtrs } : p)),
onRevive: revive,
};

return (
<div style={{
position: “fixed”, inset: 0,
display: “flex”, flexDirection: “column”,
background: “#08080e”, fontFamily: “‘Cinzel’, serif”, color: “#e8dcc8”,
overflow: “hidden”,
paddingTop: “env(safe-area-inset-top)”,
paddingBottom: “env(safe-area-inset-bottom)”,
paddingLeft: “env(safe-area-inset-left)”,
paddingRight: “env(safe-area-inset-right)”,
}}>
